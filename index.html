<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="progressbar.css">
    <title>U know what im sayin'</title>
</head>
<body>
    <div class="test-text" >
        <p>
            Bask in the vibes<br>
            When seven sun sets
        </p>
    </div>
    <!-- ==================== 进度条组件 ==================== -->
    <div class="progress-wrapper" id="progressWrapper">
        <!-- 进度条 -->

        <div class="progress-bar" id="progressBar">
            <!-- 白色填充层 -->
            <div class="progress-fill" id="progressFill"></div>
            <!-- 进度文字（mix-blend-mode: difference 自动处理颜色反转） -->
            <span class="progress-label" id="progressLabel"> 0 / 100 </span>
        </div>
        <!-- 右侧百分比 -->
        <span class="progress-percent" id="progressPercent">0.00%</span>
    </div>
    <script src="script.js"></script>
</body>
</html>
